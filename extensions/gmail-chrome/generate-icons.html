<!DOCTYPE html>
<html>
<head><title>Generate Peeeky Icons</title></head>
<body>
<p>Right-click each canvas and "Save image as" to create the icon PNGs:</p>
<div style="display:flex;gap:20px;padding:20px;">
  <div>
    <p>16x16</p>
    <canvas id="c16" width="16" height="16"></canvas>
  </div>
  <div>
    <p>48x48</p>
    <canvas id="c48" width="48" height="48"></canvas>
  </div>
  <div>
    <p>128x128</p>
    <canvas id="c128" width="128" height="128"></canvas>
  </div>
</div>
<script>
function drawIcon(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext("2d");
  // Background
  ctx.fillStyle = "#1A1A2E";
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();
  // Letter P
  ctx.fillStyle = "#6C5CE7";
  ctx.font = `bold ${size * 0.6}px -apple-system, sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("P", size / 2, size / 2 + size * 0.03);
}
drawIcon("c16", 16);
drawIcon("c48", 48);
drawIcon("c128", 128);

// Auto-download
["c16","c48","c128"].forEach(id => {
  const c = document.getElementById(id);
  const link = document.createElement("a");
  link.download = `icon${c.width}.png`;
  link.href = c.toDataURL("image/png");
  link.click();
});
</script>
</body>
</html>
